<!DOCTYPE html>
<html>
<head>
    <title>02 ClinicalIntelChat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            max-width: 1000px;
        }
        h1 {
            margin-bottom: 20px;
        }
        input {
            width: 320px;
            padding: 8px;
            font-size: 16px;
        }
        button {
            padding: 9px 14px;
            font-size: 16px;
            cursor: pointer;
        }
        .section {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        .section h3 {
            margin-top: 0;
        }
        ul {
            margin-top: 8px;
        }
        .label {
            font-weight: bold;
        }
        .small {
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>

<h1>02 ClinicalIntelChat</h1>

<input type="text" id="query" placeholder="Enter disease, therapy area, or drug">
<button onclick="search()">Search</button>

<div id="result"></div>

<script>
async function search() {
    const query = document.getElementById("query").value;
    const resultDiv = document.getElementById("result");

    resultDiv.innerHTML = "<p>Loading...</p>";

    try {
        const response = await fetch("http://127.0.0.1:8000/api/clinical-intel", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ query: query })
        });

        const data = await response.json();

        resultDiv.innerHTML = `
            <div class="section">
                <h3>Overview</h3>
                <p><span class="label">Query:</span> ${data.query || ""}</p>
                <p><span class="label">Normalized term:</span> ${data.normalized_term || ""}</p>
                <p><span class="label">Aliases:</span> ${(data.aliases || []).join(", ")}</p>
                <p>${data.overview || ""}</p>
            </div>

            <div class="section">
                <h3>Symptoms</h3>
                <ul>${(data.symptoms || []).map(item => `<li>${item}</li>`).join("")}</ul>
            </div>

            <div class="section">
                <h3>Diagnosis</h3>
                <ul>${(data.diagnosis || []).map(item => `<li>${item}</li>`).join("")}</ul>
            </div>

            <div class="section">
                <h3>ICD Codes</h3>
                <ul>${(data.icd_codes || []).map(item => `<li>${item.code}: ${item.description}</li>`).join("")}</ul>
            </div>

            <div class="section">
                <h3>Procedures</h3>
                <ul>${(data.procedures || []).map(item => `<li>${item.name}${item.code ? " (" + item.code + ")" : ""}${item.indication ? " - " + item.indication : ""}</li>`).join("")}</ul>
            </div>

            <div class="section">
                <h3>Treatments</h3>
                <ul>${(data.treatments || []).map(item => `<li>${item.name} / ${item.type}${item.line ? " / " + item.line : ""}${item.notes ? " - " + item.notes : ""}</li>`).join("")}</ul>
            </div>

            <div class="section">
                <h3>Clinical Trials</h3>
                <ul>${(data.clinical_trials || []).map(item => `<li>${item.title}${item.nct_id ? " (" + item.nct_id + ")" : ""}</li>`).join("")}</ul>
            </div>

            <div class="section">
                <h3>Literature</h3>
                <ul>${(data.literature || []).map(item => `<li>${item.title}${item.year ? " (" + item.year + ")" : ""}</li>`).join("")}</ul>
            </div>

            <div class="section">
                <h3>Disclaimer</h3>
                <p class="small">${data.disclaimer || ""}</p>
            </div>
        `;
    } catch (error) {
        resultDiv.innerHTML = `<p>Error: ${error.message}</p>`;
    }
}
</script>

</body>
</html>
